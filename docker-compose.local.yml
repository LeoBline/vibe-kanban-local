services:
  vibe-kanban:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
        POSTHOG_API_ENDPOINT: ${POSTHOG_API_ENDPOINT:-}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - vibe-data:/root/.local/share/ai.bloop.vibe-kanban
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db-ui:
    image: adminer:4.8.1
    ports:
      - "${DB_UI_PORT:-8081}:8080"
    volumes:
      - ./adminer.ini:/var/www/html/adminer.inc.php:ro
      - vibe-data:/data:ro
    restart: unless-stopped

volumes:
  vibe-data:
